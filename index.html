<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KB Tracker">
<title>Workout Tracker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1115;--s1:#1a1d24;--s2:#22262f;--bd:#2d323d;--tx:#e8e9ec;--tm:#8b8f9a;--ac:#fb923c;--gn:#4ade80;--bl:#60a5fa;--rd:#f87171;--or:#fb923c;--pr:#a78bfa;--cy:#22d3ee}
body{font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--tx);line-height:1.6;min-height:100vh;min-height:100dvh;-webkit-tap-highlight-color:transparent;overscroll-behavior:none}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(4px)}}
button{font-family:inherit;-webkit-appearance:none}
.ring-wrap{position:relative;margin:0 auto}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.time-big{font-size:2.2rem;font-weight:800;font-variant-numeric:tabular-nums;color:var(--tx)}
.time-sub{font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--tm)}
.btn{padding:.5rem 1.25rem;border-radius:8px;font-size:.8rem;font-weight:600;cursor:pointer;border:1px solid;display:inline-block;text-align:center}
.btn-primary{background:color-mix(in srgb,var(--color) 15%,transparent);border-color:var(--color);color:var(--color)}
.btn-ghost{background:transparent;border-color:var(--bd);color:var(--tm)}
.btn-danger{background:#f8717120;border-color:#f87171;color:#f87171}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:1rem;overflow:hidden}
.ex-name{font-size:1.15rem;font-weight:800;flex:1;padding-right:8px}
.ex-detail{font-size:.8rem;color:var(--tm);white-space:nowrap}
.sect-label{font-size:.75rem;text-transform:uppercase;letter-spacing:.12em;font-weight:800}
.sect-note{font-size:.7rem;color:var(--tm)}
.muscle-tag{font-size:.6rem;padding:.15rem .4rem;background:#fb923c15;color:#fb923c;border-radius:4px;text-transform:uppercase;font-weight:700;letter-spacing:.04em;display:inline-block;margin:0 .15rem .15rem 0}
.wt-badge{display:inline-flex;align-items:center;gap:6px;padding:.3rem .75rem;background:#fb923c15;border:1px solid #fb923c40;border-radius:8px;margin-bottom:.5rem}
.wt-label{font-size:.7rem;color:var(--tm)}
.wt-val{font-size:.9rem;font-weight:800;color:#fb923c}
.vid-link{display:inline-flex;align-items:center;gap:5px;margin-top:8px;padding:.35rem .75rem;background:#f8717115;border:1px solid #f8717140;border-radius:6px;color:#f87171;font-size:.7rem;font-weight:700;text-decoration:none;text-transform:uppercase;letter-spacing:.04em}
.set-dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700}
.fb-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:.35rem}
.fb-btn{padding:.5rem .25rem;border-radius:8px;cursor:pointer;text-align:center;display:flex;flex-direction:column;align-items:center;gap:2px;border-width:1px;border-style:solid}
.fb-emoji{font-size:1.2rem}
.fb-label{font-size:.6rem;font-weight:700;line-height:1.2}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:.6rem 1.25rem;background:var(--s1);border-radius:10px;display:flex;align-items:center;gap:.5rem;z-index:100;box-shadow:0 4px 20px #00000080;border:1px solid}
.progress-bar{height:3px;background:var(--bd);position:relative}
.progress-fill{height:3px;transition:width .4s ease}
.upcoming-row{display:flex;justify-content:space-between;align-items:center;padding:.35rem 0;border-bottom:1px solid var(--s1);font-size:.75rem;color:var(--tm)}
.day-card{position:relative;border-radius:18px;overflow:hidden;height:156px;cursor:pointer;width:100%;border:none;background:var(--s1);display:block}
.day-card-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
.day-card-scrim{position:absolute;inset:0;background:linear-gradient(to top,rgba(10,11,14,.96) 0%,rgba(10,11,14,.55) 45%,transparent 100%)}
.day-card-body{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:space-between;padding:.75rem .9rem}
.day-card-top{display:flex;justify-content:space-between;align-items:flex-start}
.day-card-bottom{display:flex;flex-direction:column;gap:.15rem}
.day-num{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.8rem;flex-shrink:0}
.day-type-chip{font-size:.55rem;text-transform:uppercase;letter-spacing:.1em;font-weight:700;padding:.2rem .45rem;border-radius:20px;background:rgba(251,146,60,.18);color:#fb923c;border:1px solid rgba(251,146,60,.35)}
</style>
</head>
<body>

"Hip 90/90 Switches":{m:["hips","glutes"],q:"Sit on floor, both legs at 90°. Rotate knees to alternate sides keeping torso tall. Feel the stretch deep in the hip capsule.",w:"none",v:"https://www.youtube.com/results?search_query=hip+90+90+switches+mobility+drill"},

"KB Rev Lunge (rack)":{m:["quads","glutes","core"],q:"KB in rack position (elbow tight, wrist straight). Step back into lunge — back knee kisses floor. Drive through front heel to stand. The offset load trains anti-rotation.",w:"16kg",v:"https://www.youtube.com/results?search_query=kettlebell+rack+position+reverse+lunge"},
"KB Push Press":{m:["shoulders","triceps","core"],q:"KB in rack. Quick dip with knees, then explode upward — use leg drive to punch KB overhead. Lock out fully. Lower with control to rack position.",w:"16kg",v:"https://www.youtube.com/results?search_query=kettlebell+push+press+technique+tutorial"},

// ─── UTILS ───
const fmt=s=>`${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
const $=id=>document.getElementById(id);
const app=$('app');

// ─── HISTORY ───
const HIST_KEY='kb_history';
// Sanitize entries so only numeric ids/elapsed and valid dates come out of localStorage
function loadHistory(){
  try{
    return (JSON.parse(localStorage.getItem(HIST_KEY)||'[]')||[])
      .filter(e=>Number.isInteger(e.dayId)&&Number.isFinite(e.elapsed)&&typeof e.date==='string')
      .map(e=>({dayId:e.dayId,elapsed:Math.max(0,Math.floor(e.elapsed)),date:new Date(e.date).toISOString()}));
  }catch(e){console.warn('loadHistory failed:',e);return[];}
}
function saveWorkout(){
  const h=loadHistory();
  h.unshift({date:new Date().toISOString(),dayId,elapsed});
  if(h.length>100)h.length=100;
  try{localStorage.setItem(HIST_KEY,JSON.stringify(h));}
  catch(e){console.warn('Could not save workout history:',e);}
}
function lastDone(id,hist){
  const e=hist.find(x=>x.dayId===id);
  if(!e)return null;
  const days=Math.floor((Date.now()-new Date(e.date))/864e5);
  if(days===0)return'Today';
  if(days===1)return'Yesterday';
  return`${days}d ago`;
}
function fmtDate(iso){
  return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

function startTick(){ticking=true;tickId=setInterval(()=>{elapsed++;updateTopBar();},1000);}
function stopTick(){ticking=false;clearInterval(tickId);}
function getDay(){return DAYS.find(d=>d.id===dayId);}
function getSec(){const d=getDay();return d?d.sections[si]:null;}
function getEx(){const s=getSec();return s&&!s.emom&&!s.amrap?s.ex[ei]:null;}
function totalEx(){const d=getDay();if(!d)return 0;return d.sections.reduce((a,s)=>a+(s.emom||s.amrap?1:s.ex.length),0);}
function doneCount(){const d=getDay();if(!d)return 0;return d.sections.slice(0,si).reduce((a,s)=>a+(s.emom||s.amrap?1:s.ex.length),0)+(getSec()?.emom||getSec()?.amrap?0:ei);}

function render(){
  clearTimers();
  if(screen==='select')renderSelect();
  else if(screen==='done')renderDone();

}

      h+=`<div style="padding:.75rem;background:var(--s2);border-radius:0 0 8px 8px;border:1px solid var(--bd);border-top:none"><div style="display:flex;gap:.75rem;align-items:flex-start">`;

      h+=`<p style="font-size:.8rem;color:#c8c9cc;line-height:1.6;margin:0">${m.q}</p>`;
      if(m.v)h+=`<a href="${m.v}" target="_blank" rel="noopener noreferrer" class="vid-link">▶ Watch Form Video</a>`;
      h+=`</div></div></div>`;
    }
    h+=`</div>`;
  }

  // Set tracker / timer / done

    h+=renderFeedback(ex);

    h+=`<div id="rest-area" style="text-align:center;padding:1.5rem 0">

      <button class="btn btn-ghost" onclick="nextEx()">Skip</button></div></div>`;

function renderSets(ex,c){
  const total=ex.s;
  let h=`<div style="padding:.5rem 0">`;
  h+=`<div style="display:flex;justify-content:center;gap:.35rem;margin-bottom:.75rem">`;
  for(let i=0;i<total;i++){
    const done=i<curSet-1,active=i===curSet-1;
    h+=`<div class="set-dot" style="background:${done?c:(active?c+'25':'var(--s1)')};border:${active?'2px solid '+c:'1px solid var(--bd)'};color:${done?'#0f1115':(active?c:'var(--tm)')}">${done?'✓':i+1}</div>`;
  }
  h+=`</div>`;
  h+=`<div style="text-align:center;color:var(--tm);font-size:.8rem;margin-bottom:.5rem">Set ${curSet} of ${total}${ex.rp?' · '+ex.rp+' reps':''}</div>`;

  if(ex.ti){
    h+=`<div style="text-align:center"><button class="btn btn-primary" style="--color:${c}" onclick="startSetTimer()">Start ${ex.t}s Timer</button><br><button class="btn btn-ghost" style="margin-top:.4rem;font-size:.7rem" onclick="finishSet()">Skip Timer</button></div>`;
  } else {
    h+=`<div style="text-align:center"><button class="btn btn-primary" style="--color:${c};padding:.65rem 2rem;font-size:.9rem;font-weight:700;border-radius:10px" onclick="finishSet()">✓ Set Complete</button></div>`;
  }
  h+=`</div>`;
  return h;
}

function renderUpcoming(d,c){
  let h=`<div style="margin-top:1rem"><div style="font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:var(--tm);margin-bottom:.3rem">Coming up</div>`;
  const up=[];let s2=si,e2=ei+1;
  while(up.length<3&&s2<d.sections.length){
    const sec=d.sections[s2];
    if(sec.emom||sec.amrap){if(s2>si)up.push({k:sec.name,d:sec.note,isSec:1});s2++;e2=0;continue;}
    while(e2<sec.ex.length&&up.length<3){up.push(sec.ex[e2]);e2++;}s2++;e2=0;
  }
  if(up.length===0){h+=`<div style="font-size:.75rem;color:var(--tm)">Last exercise!</div>`;}
  else up.forEach(u=>{
    const um=MDB[u.k];
    h+=`<div class="upcoming-row"><span>${u.k}</span><span style="display:flex;align-items:center;gap:6px">`;
    if(um&&um.w&&um.w!=='none'&&um.w!=='band')h+=`<span style="font-size:.6rem;color:#fb923c">${WT[um.w]}</span>`;
    h+=`<span style="font-size:.7rem">${u.d}</span></span></div>`;
  });
  h+=`</div>`;
  return h;
}

function renderEMOM(s,c){
  let h=`<div style="padding:0 1.25rem"><div style="text-align:center;padding:.75rem 0">
    <div style="font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--tm)" id="emom-round">Round 1 / ${Math.ceil(s.emomDur/60/s.ex.length)}</div>
    <div class="ring-wrap" style="width:150px;height:150px"><svg width="150" height="150" style="transform:rotate(-90deg)"><circle cx="75" cy="75" r="69" fill="none" stroke="var(--bd)" stroke-width="6"/><circle id="emom-ring" cx="75" cy="75" r="69" fill="none" stroke="${c}" stroke-width="6" stroke-dasharray="${2*Math.PI*69}" stroke-dashoffset="0" stroke-linecap="round"/></svg>
    <div class="ring-center"><div id="emom-time" class="time-big">1:00</div><div id="emom-total" class="time-sub">${fmt(s.emomDur)} left</div></div></div>
    <div id="emom-ex" style="margin:.75rem auto;padding:.75rem;background:var(--s1);border:2px solid ${c};border-radius:12px;max-width:300px">
      <div style="font-size:1rem;font-weight:700;color:var(--tx)">${s.ex[0].k}</div>
      <div style="font-size:.8rem;color:var(--tm)">${s.ex[0].d}</div>
      <p style="font-size:.75rem;color:var(--tm);margin-top:6px;line-height:1.5">${MDB[s.ex[0].k]?.q||''}</p>
    </div>
    <button id="emom-btn" class="btn btn-primary" style="--color:${c};padding:.55rem 1.75rem;font-size:.85rem;font-weight:700" onclick="toggleEMOM()">Start EMOM</button>
    <div style="margin-top:.75rem"><button class="btn btn-ghost" onclick="nextEx()">Skip to Next Section →</button></div>
  </div></div>`;
  return h;
}

function renderAMRAP(s,c){
  let h=`<div style="padding:0 1.25rem"><div style="text-align:center;padding:.75rem 0">
    <div class="ring-wrap" style="width:150px;height:150px"><svg width="150" height="150" style="transform:rotate(-90deg)"><circle cx="75" cy="75" r="69" fill="none" stroke="var(--bd)" stroke-width="6"/><circle id="amrap-ring" cx="75" cy="75" r="69" fill="none" stroke="${c}" stroke-width="6" stroke-dasharray="${2*Math.PI*69}" stroke-dashoffset="0" stroke-linecap="round"/></svg>
    <div class="ring-center"><div id="amrap-time" class="time-big">${fmt(s.amrapDur)}</div></div></div>
    <div style="margin:.75rem 0">`;
  s.ex.forEach(ex=>{
    const um=MDB[ex.k];
    h+=`<div style="font-size:.8rem;color:var(--tm);padding:.15rem 0"><span style="color:var(--tx);font-weight:600">${ex.k}</span> — ${ex.d}`;
    if(um?.w&&um.w!=='none')h+=` <span style="font-size:.65rem;color:#fb923c">(${WT[um.w]})</span>`;
    h+=`</div>`;
  });
  h+=`</div><div style="display:flex;align-items:center;justify-content:center;gap:.75rem">
    <button onclick="amrapRounds=Math.max(0,amrapRounds-1);$('amrap-cnt').textContent=amrapRounds" style="width:34px;height:34px;border-radius:50%;background:var(--s1);border:1px solid var(--bd);color:var(--tm);font-size:1.1rem;cursor:pointer">−</button>
    <div><div id="amrap-cnt" style="font-size:1.8rem;font-weight:800;color:#fb923c">0</div><div style="font-size:.55rem;text-transform:uppercase;letter-spacing:.1em;color:var(--tm)">Rounds</div></div>
    <button onclick="amrapRounds++;$('amrap-cnt').textContent=amrapRounds" style="width:34px;height:34px;border-radius:50%;background:var(--s1);border:1px solid ${c};color:${c};font-size:1.1rem;cursor:pointer">+</button></div>
    <button id="amrap-btn" class="btn btn-primary" style="--color:${c};margin-top:.75rem;padding:.55rem 1.75rem;font-size:.85rem;font-weight:700" onclick="toggleAMRAP()">Start AMRAP</button>
    <div style="margin-top:.75rem"><button class="btn btn-primary" style="--color:${c}" onclick="nextEx()">Finish Workout →</button></div>
  </div></div>`;
  return h;
}

// ─── ACTIONS ───
function startDay(id){dayId=id;si=0;ei=0;elapsed=0;curSet=1;resting=false;needsFeedback=false;showInfo=false;screen='workout';startTick();render();}
function backToMenu(){stopTick();clearTimers();screen='select';dayId=null;render();}
function toggleInfo(){showInfo=!showInfo;render();}

function nextEx(){
  const d=getDay(),s=d.sections[si];needsFeedback=false;resting=false;curSet=1;
  if(!s.emom&&!s.amrap&&ei<s.ex.length-1){ei++;showInfo=false;render();}
  else if(si<d.sections.length-1){si++;ei=0;showInfo=false;render();}
  else{stopTick();saveWorkout();screen='done';render();}
}
function prevEx(){
  if(ei>0){ei--;curSet=1;needsFeedback=false;resting=false;showInfo=false;render();}
  else if(si>0){const ps=getDay().sections[si-1];si--;ei=ps.emom||ps.amrap?0:ps.ex.length-1;curSet=1;needsFeedback=false;resting=false;showInfo=false;render();}
}

function finishSet(){
  const ex=getEx(),total=ex.s||1;
  if(ex.fb){needsFeedback=true;render();return;}
  if(curSet>=total){nextEx();return;}
  if(ex.rs){resting=true;restLeft=ex.rs;restTotal=ex.rs;render();}
  else{curSet++;render();}
}

function giveFeedback(i){
  const fb=FB[i];needsFeedback=false;
  const ex=getEx(),total=ex.s||1;
  showToast(fb);
  if(curSet>=total){nextEx();return;}
  if(ex.rs){curSet++;resting=true;restLeft=ex.rs;restTotal=ex.rs;render();}
  else{curSet++;render();}
}

function showToast(fb){
  if(toastId)clearTimeout(toastId);
  const t=document.createElement('div');t.className='toast';t.style.borderColor=fb.c+'40';
  t.innerHTML=`<span style="font-size:1.1rem">${fb.e}</span><span style="font-size:.8rem;color:${fb.c};font-weight:600">${fb.r}</span>`;
  document.body.appendChild(t);
  toastId=setTimeout(()=>{t.remove();toastId=null;},2500);
}

function startRest(c){
  const circ=2*Math.PI*64;
  restId=setInterval(()=>{
    restLeft--;
    const el=$('rest-time');if(el)el.textContent=fmt(restLeft);
    const ring=$('rest-ring');if(ring)ring.setAttribute('stroke-dashoffset',circ*(1-restLeft/restTotal));
    if(restLeft<=0){clearInterval(restId);resting=false;curSet++;render();}
  },1000);
}
function skipRest(){clearInterval(restId);resting=false;curSet++;render();}

function startSetTimer(){
  const ex=getEx(),c=getDay().color;
  timerLeft=ex.t;timerTotal=ex.t;timerOn=true;
  const circ=2*Math.PI*54;
  timerId=setInterval(()=>{
    timerLeft--;
    const el=$('ex-time');if(el)el.textContent=fmt(timerLeft);
    const ring=$('ex-ring');if(ring)ring.setAttribute('stroke-dashoffset',circ*(1-timerLeft/timerTotal));
    if(timerLeft<=0){clearInterval(timerId);timerOn=false;finishSet();}
  },1000);
  render();
}

function toggleExTimer(){
  if(timerOn){clearInterval(timerId);timerOn=false;const b=$('ex-toggle');if(b)b.textContent='Resume';}
  else{
    const c=getDay().color,circ=2*Math.PI*54;
    timerOn=true;
    timerId=setInterval(()=>{
      timerLeft--;
      const el=$('ex-time');if(el)el.textContent=fmt(timerLeft);
      const ring=$('ex-ring');if(ring)ring.setAttribute('stroke-dashoffset',circ*(1-timerLeft/timerTotal));
      if(timerLeft<=0){clearInterval(timerId);timerOn=false;nextEx();}
    },1000);
    const b=$('ex-toggle');if(b){b.textContent='Pause';b.className='btn btn-danger';}
  }
}

function updateTopBar(){const el=$('elapsed');if(el)el.textContent=fmt(elapsed);}

// ─── EMOM ───
function initEMOM(s){emomLeft=s.emomDur;emomOn=false;}
function toggleEMOM(){
  const s=getSec(),c=getDay().color,circ=2*Math.PI*69;
  if(emomOn){clearInterval(emomId);emomOn=false;const b=$('emom-btn');if(b)b.textContent='Resume';return;}
  emomOn=true;const b=$('emom-btn');if(b){b.textContent='Pause';b.className='btn btn-danger';}
  emomId=setInterval(()=>{
    emomLeft--;if(emomLeft<=0){clearInterval(emomId);emomOn=false;const b=$('emom-btn');if(b)b.textContent='Complete';return;}
    const el2=s.emomDur-emomLeft,min=Math.floor(el2/60),idx=min%s.ex.length,rnd=Math.floor(min/s.ex.length)+1,sec=el2%60;
    const tl=$('emom-time');if(tl)tl.textContent=fmt(60-sec);
    const tot=$('emom-total');if(tot)tot.textContent=fmt(emomLeft)+' left';
    const rn=$('emom-round');if(rn)rn.textContent=`Round ${rnd} / ${Math.ceil(s.emomDur/60/s.ex.length)}`;
    const ring=$('emom-ring');if(ring)ring.setAttribute('stroke-dashoffset',circ*(1-(60-sec)/60));
    const exEl=$('emom-ex');if(exEl){const m=MDB[s.ex[idx].k];exEl.innerHTML=`<div style="font-size:1rem;font-weight:700;color:var(--tx)">${s.ex[idx].k}</div><div style="font-size:.8rem;color:var(--tm)">${s.ex[idx].d}</div>${m?`<p style="font-size:.75rem;color:var(--tm);margin-top:6px;line-height:1.5">${m.q}</p>`:''}`;}
  },1000);
}

// ─── AMRAP ───
function initAMRAP(s){amrapLeft=s.amrapDur;amrapOn=false;amrapRounds=0;}
function toggleAMRAP(){
  const s=getSec(),c=getDay().color,circ=2*Math.PI*69;
  if(amrapOn){clearInterval(amrapId);amrapOn=false;const b=$('amrap-btn');if(b)b.textContent='Resume';return;}
  amrapOn=true;const b=$('amrap-btn');if(b){b.textContent='Pause';b.className='btn btn-danger';}
  amrapId=setInterval(()=>{
    amrapLeft--;if(amrapLeft<=0){clearInterval(amrapId);amrapOn=false;const b=$('amrap-btn');if(b)b.textContent='Done!';
    const tl=$('amrap-time');if(tl)tl.textContent='TIME';return;}
    const tl=$('amrap-time');if(tl)tl.textContent=fmt(amrapLeft);
    const ring=$('amrap-ring');if(ring)ring.setAttribute('stroke-dashoffset',circ*(1-amrapLeft/getSec().amrapDur));
  },1000);
}

// ─── PIN ───
// Hash of the correct PIN — input is hashed via SHA-256 and compared, PIN never stored in plain text
const PIN_HASH='6161b2838ffa6ce17b84db3b45b4f8437855ecf43e75de2d1ad0008eaae91aa0';
let pinInput='',pinError='';

async function sha256(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function initApp(){renderPin();}

function renderPin(){
  const dots=[0,1,2,3].map(i=>`<div style="width:14px;height:14px;border-radius:50%;background:${i<pinInput.length?'#fb923c':'var(--bd)'};transition:background .15s"></div>`).join('');
  const keys=[1,2,3,4,5,6,7,8,9,'','0','⌫'].map(k=>{
    if(k==='')return'<div></div>';
    const back=k==='⌫';
    return`<button onclick="${back?'pinDel()':'pinTap('+k+')'}" style="height:64px;border-radius:14px;background:var(--s1);border:1px solid var(--bd);font-size:${back?'1.4':'1.3'}rem;font-weight:700;color:${back?'var(--tm)':'var(--tx)'};cursor:pointer">${k}</button>`;
  }).join('');
  app.innerHTML=`<div style="min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem">
    <div style="font-size:1.4rem;font-weight:900;letter-spacing:.04em;color:#fb923c;margin-bottom:.25rem">KB TRACKER</div>
    <div style="font-size:.8rem;color:var(--tm);margin-bottom:2.5rem">Enter PIN</div>
    <div id="pin-dots" style="display:flex;gap:1rem;margin-bottom:3rem">${dots}</div>
    <div id="pin-err" style="color:var(--or);font-size:.7rem;margin-top:-2rem;margin-bottom:2rem;text-align:center;min-height:1em"></div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;width:100%;max-width:280px">${keys}</div>
  </div>`;
  if(pinError){const e=$('pin-err');if(e)e.textContent=pinError;}
}

function pinTap(n){
  if(pinInput.length>=4)return;
  pinError='';pinInput+=String(n);
  renderPin();
  if(pinInput.length===4)setTimeout(checkPin,120);
}

function pinDel(){pinError='';pinInput=pinInput.slice(0,-1);renderPin();}

async function checkPin(){
  try{
    const h=await sha256(pinInput);
    if(h===PIN_HASH){render();}
    else{pinInput='';shakeDots();}
  }catch(e){
    // crypto.subtle is undefined on file:// or non-secure origins
    console.error('PIN check failed — serve over HTTPS:',e);
    pinInput='';pinError='Serve over HTTPS to enable PIN';renderPin();
  }
}

function shakeDots(){
  const el=$('pin-dots');if(!el)return;
  [...el.children].forEach(d=>{d.style.background='#f87171';});
  el.style.animation='shake .35s ease';
  setTimeout(()=>{el.style.animation='';renderPin();},400);
}

// ─── INIT ───
initApp();
</script>
