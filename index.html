<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KB Tracker">
<title>Workout Tracker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1115;--s1:#1a1d24;--s2:#22262f;--bd:#2d323d;--tx:#e8e9ec;--tm:#8b8f9a;--ac:#f0c040;--gn:#4ade80;--bl:#60a5fa;--rd:#f87171;--or:#fb923c;--pr:#a78bfa;--cy:#22d3ee}
body{font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--tx);line-height:1.6;min-height:100vh;min-height:100dvh;-webkit-tap-highlight-color:transparent;overscroll-behavior:none}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(4px)}}
button{font-family:inherit;-webkit-appearance:none}
.ring-wrap{position:relative;margin:0 auto}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.time-big{font-size:2.2rem;font-weight:800;font-variant-numeric:tabular-nums;color:var(--tx)}
.time-sub{font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--tm)}
.btn{padding:.5rem 1.25rem;border-radius:8px;font-size:.8rem;font-weight:600;cursor:pointer;border:1px solid;display:inline-block;text-align:center}
.btn-primary{background:color-mix(in srgb,var(--color) 15%,transparent);border-color:var(--color);color:var(--color)}
.btn-ghost{background:transparent;border-color:var(--bd);color:var(--tm)}
.btn-danger{background:#f8717120;border-color:#f87171;color:#f87171}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:1rem}
.ex-name{font-size:1.05rem;font-weight:700;flex:1;padding-right:8px}
.ex-detail{font-size:.8rem;color:var(--tm);white-space:nowrap}
.sect-label{font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;font-weight:700}
.sect-note{font-size:.7rem;color:var(--tm)}
.muscle-tag{font-size:.6rem;padding:.15rem .4rem;background:#f0c04015;color:#f0c040;border-radius:4px;text-transform:uppercase;font-weight:700;letter-spacing:.04em;display:inline-block;margin:0 .15rem .15rem 0}
.wt-badge{display:inline-flex;align-items:center;gap:6px;padding:.3rem .75rem;background:#f0c04015;border:1px solid #f0c04040;border-radius:8px;margin-bottom:.5rem}
.wt-label{font-size:.7rem;color:var(--tm)}
.wt-val{font-size:.9rem;font-weight:800;color:#f0c040}
.vid-link{display:inline-flex;align-items:center;gap:5px;margin-top:8px;padding:.35rem .75rem;background:#f8717115;border:1px solid #f8717140;border-radius:6px;color:#f87171;font-size:.7rem;font-weight:700;text-decoration:none;text-transform:uppercase;letter-spacing:.04em}
.set-dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700}
.fb-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:.35rem}
.fb-btn{padding:.5rem .25rem;border-radius:8px;cursor:pointer;text-align:center;display:flex;flex-direction:column;align-items:center;gap:2px;border-width:1px;border-style:solid}
.fb-emoji{font-size:1.2rem}
.fb-label{font-size:.6rem;font-weight:700;line-height:1.2}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:.6rem 1.25rem;background:var(--s1);border-radius:10px;display:flex;align-items:center;gap:.5rem;z-index:100;box-shadow:0 4px 20px #00000080;border:1px solid}
.progress-bar{height:3px;background:var(--bd);position:relative}
.progress-fill{height:3px;transition:width .3s}
.upcoming-row{display:flex;justify-content:space-between;align-items:center;padding:.35rem 0;border-bottom:1px solid var(--s1);font-size:.75rem;color:var(--tm)}
.day-btn{display:flex;align-items:center;gap:.75rem;padding:.9rem 1rem;background:var(--s1);border:1px solid var(--bd);border-radius:12px;cursor:pointer;text-align:left;width:100%}
.day-num{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.85rem;flex-shrink:0}
</style>
</head>
<body>
<div id="app"></div>

// ─── DATA ───
const WT={"none":"Bodyweight","band":"Band","12kg":"12 kg / 26 lb","16kg":"16 kg / 35 lb","20kg":"20 kg / 44 lb","24kg":"24 kg / 53 lb"};
const FB=[{l:"Too easy",e:"😎",c:"#60a5fa",r:"Go heavier next set"},{l:"Just right",e:"💪",c:"#4ade80",r:"Perfect — stay here"},{l:"Challenging",e:"🔥",c:"#fb923c",r:"Good stimulus — keep it"},{l:"Too hard",e:"😤",c:"#f87171",r:"Drop weight next set"}];

const MDB={
"Hip 90/90 Switches":{m:["hips","glutes"],q:"Sit on floor, both legs at 90°. Rotate knees to alternate sides keeping torso tall. Feel the stretch deep in the hip capsule.",w:"none",v:"https://www.youtube.com/results?search_query=hip+90+90+switches+mobility+drill"},
"Thoracic Rotation":{m:["upper back","core"],q:"Side-lying, knees stacked. Top arm opens to opposite side like a book. Follow your hand with your eyes. Exhale as you open.",w:"none",v:"https://www.youtube.com/results?search_query=open+book+thoracic+rotation+stretch"},
"Wall Ankle Dorsiflexion":{m:["calves","ankles"],q:"Face wall, foot 4\" away. Drive knee forward over toes — heel stays planted. You should feel a deep stretch above the ankle.",w:"none",v:"https://www.youtube.com/results?search_query=wall+ankle+dorsiflexion+mobility+drill"},
"Hip Flexor Stretch":{m:["hips","quads"],q:"Half-kneeling on back knee. Squeeze the glute of the down leg and shift hips forward. Don't arch your lower back — tuck pelvis slightly.",w:"none",v:"https://www.youtube.com/results?search_query=half+kneeling+hip+flexor+stretch+proper+form"},
"Band Pull-Aparts":{m:["upper back","shoulders"],q:"Hold band at shoulder width, arms straight ahead. Pull apart by squeezing shoulder blades together. Pause at full contraction. Control the return.",w:"band",v:"https://www.youtube.com/results?search_query=band+pull+aparts+proper+form"},
"KB Halo":{m:["shoulders","core"],q:"Hold KB upside-down by horns at chest. Circle it around your head, keeping elbows tight. Core stays braced — don't let your torso sway.",w:"16kg",v:"https://www.youtube.com/results?search_query=kettlebell+halo+exercise+form"},
"BW Squat to Stand":{m:["hamstrings","hips","quads"],q:"Bend forward and grab toes. Drop hips into a deep squat while holding toes, chest up. Stand back up with straight legs. Repeat.",w:"none",v:"https://www.youtube.com/results?search_query=squat+to+stand+mobility+exercise"},
"KB Deadlift (light)":{m:["hamstrings","glutes","core"],q:"KB between feet. Hinge at hips, flat back, grab the handle. Drive through feet to stand. Squeeze glutes at top. Reverse with control.",w:"16kg",v:"https://www.youtube.com/results?search_query=kettlebell+deadlift+proper+form+tutorial"},
"KB Goblet Squat":{m:["quads","glutes","core"],q:"Hold KB at chest by horns, elbows inside knees. Sit straight down between your legs — knees track over toes. Drive up through heels. Keep chest tall throughout.",w:"20kg",v:"https://www.youtube.com/results?search_query=kettlebell+goblet+squat+proper+form"},
"KB SA Floor Press":{m:["chest","triceps","core"],q:"Lie on back, knees bent. One KB at shoulder. Press straight up, locking out elbow. Lower slowly until upper arm touches floor. The floor limits range — focus on pressing power.",w:"16kg",v:"https://www.youtube.com/results?search_query=single+arm+kettlebell+floor+press+form"},
"KB Rev Lunge (rack)":{m:["quads","glutes","core"],q:"KB in rack position (elbow tight, wrist straight). Step back into lunge — back knee kisses floor. Drive through front heel to stand. The offset load trains anti-rotation.",w:"16kg",v:"https://www.youtube.com/results?search_query=kettlebell+rack+position+reverse+lunge"},
"KB Push Press":{m:["shoulders","triceps","core"],q:"KB in rack. Quick dip with knees, then explode upward — use leg drive to punch KB overhead. Lock out fully. Lower with control to rack position.",w:"16kg",v:"https://www.youtube.com/results?search_query=kettlebell+push+press+technique+tutorial"},
"KB SA Row":{m:["lats","upper back","biceps"],q:"Hinge forward ~45°, free hand on knee. Pull KB to hip — elbow drives straight back. Squeeze shoulder blade at top for 1 second. Lower with control.",w:"20kg",v:"https://www.youtube.com/results?search_query=single+arm+kettlebell+row+form"},
"KB Suitcase March":{m:["core","shoulders","hips"],q:"Hold KB in one hand at your side like a suitcase. March in place with high knees. Fight the urge to lean toward the weight — stay perfectly upright.",w:"20kg",v:"https://www.youtube.com/results?search_query=kettlebell+suitcase+carry+march+exercise"},
"Brisk Walk / Easy Jog":{m:["full body"],q:"Conversational pace — you should be able to talk in full sentences. Arms relaxed, posture tall. Zone 2 effort.",w:"none",v:null},
"Walk Intervals":{m:["quads","calves","glutes"],q:"60 seconds at your fastest walking pace — pump arms, long stride. Then 60 seconds easy. Heart rate should spike during fast segments.",w:"none",v:null},
"Cool-Down Walk":{m:["full body"],q:"Easy walking. Let heart rate come down gradually. Breathe deeply through the nose. Shake out arms and legs.",w:"none",v:null},
"KB Swings":{m:["glutes","hamstrings","core","shoulders"],q:"Hinge back — KB swings between legs. SNAP hips forward explosively to drive the bell up to chest height. Arms are just along for the ride. Power comes from the hips, not the arms.",w:"20kg",v:"https://www.youtube.com/results?search_query=kettlebell+swing+proper+form+tutorial"},
"Jump Rope / Jacks":{m:["calves","shoulders","full body"],q:"Light bouncing on balls of feet. Wrists do the work — not big arm circles. Stay relaxed in the shoulders.",w:"none",v:null},
"KB Figure-8s":{m:["core","forearms","hips"],q:"Wide stance, slight squat. Pass KB in a figure-8 pattern between and around your legs. Stay low, core braced. Smooth, controlled movement.",w:"16kg",v:"https://www.youtube.com/results?search_query=kettlebell+figure+8+exercise+tutorial"},
"Burpees":{m:["full body"],q:"Drop to floor — chest touches. Push up explosively, jump feet to hands, stand and jump with hands overhead. Pace yourself.",w:"none",v:"https://www.youtube.com/results?search_query=burpee+proper+form+tutorial"},
"Cat-Cow":{m:["core","upper back"],q:"On all fours. Inhale: drop belly, lift chest (cow). Exhale: round spine toward ceiling, tuck chin (cat). Move slowly through full range.",w:"none",v:"https://www.youtube.com/results?search_query=cat+cow+stretch+tutorial"},
"KB Good Morning":{m:["hamstrings","glutes","core"],q:"KB held at chest. Hinge at hips with soft knees — push hips straight back. Feel hamstring stretch. Squeeze glutes to stand. Keep back flat.",w:"16kg",v:"https://www.youtube.com/results?search_query=kettlebell+good+morning+exercise+form"},
"Dead Hang / Pull-Aparts":{m:["lats","forearms","shoulders"],q:"Dead hang: grip bar, let body hang fully. Relax shoulders — let them stretch. Or do more band pull-aparts if no bar.",w:"none",v:"https://www.youtube.com/results?search_query=dead+hang+exercise+form+benefits"},
"KB Swing (two-hand)":{m:["glutes","hamstrings","core","shoulders"],q:"Both hands on bell. Grip tight, hinge deep, snap hips. The bell should float at the top — if you're pulling with arms, go lighter.",w:"20kg",v:"https://www.youtube.com/results?search_query=two+hand+kettlebell+swing+form+tutorial"},
"KB Romanian Deadlift":{m:["hamstrings","glutes","core"],q:"Hold KB(s) at thighs. Push hips back with soft knees — slide bells down shins. Stop when you feel a deep hamstring stretch. NEVER round your lower back.",w:"20kg",v:"https://www.youtube.com/results?search_query=kettlebell+romanian+deadlift+RDL+form"},

"KB Lateral Lunge":{m:["quads","hips","glutes"],q:"Hold KB at chest (goblet). Step wide to one side, sit hips back deep. Drive off bent leg to return center. KB close to chest.",w:"16kg",v:"https://www.youtube.com/results?search_query=kettlebell+goblet+lateral+lunge+form"},
"KB Waiter Carry":{m:["shoulders","core","forearms"],q:"Hold KB bottoms-up overhead (bell above handle). Walk with arm fully locked out. The instability forces rotator cuff and grip to work overtime.",w:"12kg",v:"https://www.youtube.com/results?search_query=kettlebell+waiter+carry+bottoms+up+exercise"},
"KB Dead Bug":{m:["core"],q:"Lie on back, KB held with straight arms over chest. Extend opposite arm and leg toward floor while keeping low back pressed into floor.",w:"12kg",v:"https://www.youtube.com/results?search_query=kettlebell+dead+bug+exercise+form"},
"KB Russian Twist":{m:["core"],q:"Sit with knees bent, lean back ~45°. Hold KB at chest. Rotate torso side to side, tapping KB near hip each side. Control the rotation.",w:"12kg",v:"https://www.youtube.com/results?search_query=kettlebell+russian+twist+exercise+form"},
"Brisk Walk":{m:["full body"],q:"25–30 minutes at a pace that elevates heart rate but you can still talk. Arms pumping, stride long. Zone 2.",w:"none",v:null},
"Easy Jog":{m:["quads","calves","glutes"],q:"Slow, easy pace. If you can't talk comfortably, slow down. Focus on smooth footstrike and relaxed upper body.",w:"none",v:null},

};

// ─── MUSCLE MAP ───
const MMAP={chest:{x:22,y:18,w:16,h:8},shoulders:{x:14,y:14,w:8,h:6},triceps:{x:10,y:22,w:5,h:10},biceps:{x:11,y:22,w:5,h:9},"upper back":{x:20,y:14,w:20,h:10},lats:{x:18,y:22,w:6,h:10},core:{x:22,y:27,w:16,h:10},glutes:{x:22,y:34,w:16,h:8},quads:{x:18,y:40,w:10,h:14},hamstrings:{x:20,y:40,w:10,h:14},calves:{x:20,y:54,w:8,h:8},hips:{x:16,y:34,w:8,h:6},ankles:{x:20,y:60,w:8,h:4},"full body":{x:15,y:14,w:30,h:50},forearms:{x:8,y:30,w:5,h:8},traps:{x:22,y:10,w:16,h:6}};

function muscleSVG(groups){
  let rects='<ellipse cx="30" cy="7" rx="6" ry="7" fill="#2d323d"/><rect x="20" y="13" rx="4" width="20" height="26" fill="#2d323d"/><rect x="8" y="15" rx="3" width="8" height="22" fill="#2d323d" transform="rotate(-8 12 15)"/><rect x="44" y="15" rx="3" width="8" height="22" fill="#2d323d" transform="rotate(8 48 15)"/><rect x="21" y="37" rx="3" width="8" height="22" fill="#2d323d" transform="rotate(-3 25 37)"/><rect x="31" y="37" rx="3" width="8" height="22" fill="#2d323d" transform="rotate(3 35 37)"/><rect x="20" y="56" rx="2" width="7" height="8" fill="#2d323d"/><rect x="33" y="56" rx="2" width="7" height="8" fill="#2d323d"/>';
  groups.forEach(g=>{const p=MMAP[g.toLowerCase()];if(p)rects+=`<rect x="${p.x}" y="${p.y}" width="${p.w}" height="${p.h}" rx="3" fill="#f0c040" opacity="0.7"/>`;});
  return `<svg width="56" height="56" viewBox="0 0 60 68" fill="none">${rects}</svg>`;
}

// ─── UTILS ───
const fmt=s=>`${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
const $=id=>document.getElementById(id);
const app=$('app');

// ─── HISTORY ───
const HIST_KEY='kb_history';
// Sanitize entries so only numeric ids/elapsed and valid dates come out of localStorage
function loadHistory(){
  try{
    return (JSON.parse(localStorage.getItem(HIST_KEY)||'[]')||[])
      .filter(e=>Number.isInteger(e.dayId)&&Number.isFinite(e.elapsed)&&typeof e.date==='string')
      .map(e=>({dayId:e.dayId,elapsed:Math.max(0,Math.floor(e.elapsed)),date:new Date(e.date).toISOString()}));
  }catch{return[];}
}
function saveWorkout(){
  const h=loadHistory();
  h.unshift({date:new Date().toISOString(),dayId,elapsed});
  if(h.length>100)h.length=100;
  localStorage.setItem(HIST_KEY,JSON.stringify(h));
}
function lastDone(id){
  const e=loadHistory().find(x=>x.dayId===id);
  if(!e)return null;
  const days=Math.floor((Date.now()-new Date(e.date))/864e5);
  if(days===0)return'Today';
  if(days===1)return'Yesterday';
  return`${days}d ago`;
}
function fmtDate(iso){
  return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

// ─── STATE ───
let screen='select',dayId=null,si=0,ei=0,elapsed=0,ticking=false,tickId=null;
let curSet=1,resting=false,restLeft=0,restTotal=0,restId=null;
let timerLeft=0,timerTotal=0,timerOn=false,timerId=null;
let emomLeft=0,emomOn=false,emomId=null;
let amrapLeft=0,amrapOn=false,amrapId=null,amrapRounds=0;
let showInfo=true,needsFeedback=false,toastData=null,toastId=null;

function startTick(){ticking=true;tickId=setInterval(()=>{elapsed++;updateTopBar();},1000);}
function stopTick(){ticking=false;clearInterval(tickId);}
function getDay(){return DAYS.find(d=>d.id===dayId);}
function getSec(){const d=getDay();return d?d.sections[si]:null;}
function getEx(){const s=getSec();return s&&!s.emom&&!s.amrap?s.ex[ei]:null;}
function totalEx(){const d=getDay();if(!d)return 0;return d.sections.reduce((a,s)=>a+(s.emom||s.amrap?1:s.ex.length),0);}
function doneCount(){const d=getDay();if(!d)return 0;return d.sections.slice(0,si).reduce((a,s)=>a+(s.emom||s.amrap?1:s.ex.length),0)+(getSec()?.emom||getSec()?.amrap?0:ei);}

// ─── RENDER ───
function render(){
  clearTimers();
  if(screen==='select')renderSelect();
  else if(screen==='done')renderDone();
  else renderWorkout();
}

function clearTimers(){clearInterval(restId);clearInterval(timerId);clearInterval(emomId);clearInterval(amrapId);resting=false;timerOn=false;}

function renderSelect(){
  // All values from DAYS are hardcoded constants; history values are sanitized in loadHistory()
  const hist=loadHistory();
  const dayBtns=DAYS.map(d=>{
    const ld=lastDone(d.id); // returns 'Today','Yesterday','Nd ago', or null — no user input
    const ldHtml=ld?` · <span style="color:${ld==='Today'?'#4ade80':'var(--tm)'}">${ld}</span>`:'';
    return`<button class="day-btn" onclick="startDay(${d.id})">
      <div class="day-num" style="background:${d.color}20;color:${d.color}">${d.id}</div>
      <div style="flex:1"><div style="font-weight:700;font-size:.9rem;color:var(--tx)">${d.title}</div>
      <div style="font-size:.72rem;color:var(--tm)">${d.type} · ${d.dur}${ldHtml}</div></div>
      <div style="color:var(--tm);font-size:1rem">›</div>
    </button>`;
  }).join('');
  // History rows: dayId is an integer, elapsed is a non-negative integer, date is a valid ISO string — all sanitized
  const histHtml=hist.length===0?'':`<div style="padding:1.25rem 1rem 2rem">
    <div style="font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:var(--tm);font-weight:700;margin-bottom:.5rem">Recent Workouts</div>
    ${hist.slice(0,8).map(e=>{
      const day=DAYS.find(d=>d.id===e.dayId); // lookup from hardcoded DAYS, not raw storage value
      const color=day?day.color:'var(--tm)';
      const title=day?`Day ${day.id}: ${day.title}`:'Unknown';
      return`<div style="display:flex;justify-content:space-between;align-items:center;padding:.4rem 0;border-bottom:1px solid var(--s2);font-size:.75rem">
        <div style="display:flex;align-items:center;gap:.5rem">
          <div style="width:8px;height:8px;border-radius:50%;background:${color}"></div>
          <span style="color:var(--tx);font-weight:600">${title}</span>
        </div>
        <div style="display:flex;align-items:center;gap:.5rem;color:var(--tm)">
          <span>${fmt(e.elapsed)}</span>
          <span style="color:var(--bd)">·</span>
          <span>${fmtDate(e.date)}</span>
        </div>
      </div>`;
    }).join('')}
  </div>`;
  app.innerHTML=`<div style="padding:2rem 1.25rem 1rem;text-align:center">
    <div style="font-size:1.5rem;font-weight:800;background:linear-gradient(135deg,#f0c040,#fde68a);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Workout Tracker</div>
    <div style="font-size:.8rem;color:var(--tm);margin-top:4px">Select today's workout</div>
  </div>
  <div style="padding:0 1rem;display:flex;flex-direction:column;gap:.5rem">${dayBtns}</div>
  ${histHtml}`;
}

function renderDone(){
  const d=getDay();
  app.innerHTML=`<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center">
    <div style="font-size:2.5rem;margin-bottom:.5rem">💪</div>
    <div style="font-size:1.6rem;font-weight:800;background:linear-gradient(135deg,#4ade80,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Workout Complete</div>
    <div style="font-size:.85rem;color:var(--tm);margin:.5rem 0">Day ${d.id}: ${d.title}</div>
    <div style="font-size:2.2rem;font-weight:800;font-variant-numeric:tabular-nums;color:#f0c040;margin:.25rem 0">${fmt(elapsed)}</div>
    <div style="font-size:.7rem;color:var(--tm)">Total time</div>
    <button class="btn btn-primary" style="--color:#4ade80;margin-top:1.5rem;padding:.65rem 1.75rem;font-size:.85rem;font-weight:700;border-radius:10px" onclick="backToMenu()">Back to Menu</button>
  </div>`;
}

function renderWorkout(){
  const d=getDay(),s=getSec(),ex=getEx(),c=d.color,tc=totalEx(),dc=doneCount(),pct=tc>0?(dc/tc)*100:0;
  let html=`<div id="topbar" style="position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--bd)">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:.6rem 1rem">
      <button onclick="backToMenu()" style="background:none;border:none;color:var(--tm);font-size:.8rem;cursor:pointer">← Back</button>
      <div style="text-align:center"><div style="font-size:.6rem;color:var(--tm);text-transform:uppercase;letter-spacing:.08em">Day ${d.id}</div>
      <div style="font-size:.8rem;font-weight:700;color:${c}">${d.title}</div></div>
      <div id="elapsed" style="font-variant-numeric:tabular-nums;font-size:.8rem;font-weight:700;color:#f0c040">${fmt(elapsed)}</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${c}"></div></div>
  </div>`;

  html+=`<div style="padding:.75rem 1.25rem .25rem"><div class="sect-label" style="color:${c}">${s.name}</div>`;
  if(s.note)html+=`<div class="sect-note">${s.note}</div>`;
  html+=`</div>`;

  if(s.emom){html+=renderEMOM(s,c);}
  else if(s.amrap){html+=renderAMRAP(s,c);}
  else{html+=renderExercise(ex,s,d,c,dc,tc);}

  app.innerHTML=html;
  if(s.emom)initEMOM(s);
  if(s.amrap)initAMRAP(s);
}

function renderExercise(ex,s,d,c,dc,tc){
  const m=MDB[ex.k];
  let h=`<div style="padding:0 1.25rem 2rem"><div class="card" style="margin-top:.25rem">`;
  h+=`<div style="display:flex;justify-content:space-between;align-items:baseline"><div class="ex-name">${ex.k}</div><div class="ex-detail">${ex.d}</div></div>`;

  // Weight + movement info
  if(m){
    const wt=m.w;
    h+=`<div style="margin-top:.75rem">`;
    if(wt&&wt!=='none'&&wt!=='band')h+=`<div class="wt-badge"><span class="wt-label">REC WEIGHT</span><span class="wt-val">${WT[wt]}</span></div>`;
    if(wt==='band')h+=`<div style="display:inline-flex;padding:.3rem .75rem;background:#a78bfa15;border:1px solid #a78bfa40;border-radius:8px;margin-bottom:.5rem"><span style="font-size:.85rem;font-weight:700;color:#a78bfa">Resistance Band</span></div>`;

    h+=`<button onclick="toggleInfo()" style="display:block;width:100%;padding:.5rem;background:${showInfo?c+'10':'transparent'};border:1px solid ${showInfo?c+'40':'var(--bd)'};border-radius:8px;color:${showInfo?c:'var(--tm)'};font-size:.75rem;font-weight:600;cursor:pointer;text-align:left">${showInfo?'▾ Hide movement guide':'▸ Show movement guide'}</button>`;

    if(showInfo){
      h+=`<div style="padding:.75rem;background:var(--s2);border-radius:0 0 8px 8px;border:1px solid var(--bd);border-top:none"><div style="display:flex;gap:.75rem;align-items:flex-start">`;
      h+=`<div style="flex-shrink:0">${muscleSVG(m.m)}</div><div style="flex:1">`;
      h+=`<div style="margin-bottom:.4rem">${m.m.map(mu=>`<span class="muscle-tag">${mu}</span>`).join('')}</div>`;
      h+=`<p style="font-size:.8rem;color:#c8c9cc;line-height:1.6;margin:0">${m.q}</p>`;
      if(m.v)h+=`<a href="${m.v}" target="_blank" rel="noopener noreferrer" class="vid-link">▶ Watch Form Video</a>`;
      h+=`</div></div></div>`;
    }
    h+=`</div>`;
  }

  // Set tracker / timer / done
  if(needsFeedback){
    h+=renderFeedback(ex);
  } else if(resting){
    h+=`<div id="rest-area" style="text-align:center;padding:1.5rem 0">
      <div class="ring-wrap" style="width:140px;height:140px"><svg width="140" height="140" style="transform:rotate(-90deg)"><circle cx="70" cy="70" r="64" fill="none" stroke="var(--bd)" stroke-width="6"/><circle id="rest-ring" cx="70" cy="70" r="64" fill="none" stroke="${c}" stroke-width="6" stroke-dasharray="${2*Math.PI*64}" stroke-dashoffset="0" stroke-linecap="round"/></svg>
      <div class="ring-center"><div id="rest-time" class="time-big">${fmt(restLeft)}</div><div class="time-sub">Rest</div></div></div>
      <button class="btn btn-primary" style="--color:${c};margin-top:.75rem" onclick="skipRest()">Skip Rest</button></div>`;
    setTimeout(()=>startRest(c),50);
  } else if(ex.s){
    h+=renderSets(ex,c);
  } else if(ex.ti){
    h+=`<div id="timer-area" style="text-align:center;padding:.75rem 0">
      <div class="ring-wrap" style="width:120px;height:120px"><svg width="120" height="120" style="transform:rotate(-90deg)"><circle cx="60" cy="60" r="54" fill="none" stroke="var(--bd)" stroke-width="6"/><circle id="ex-ring" cx="60" cy="60" r="54" fill="none" stroke="${c}" stroke-width="6" stroke-dasharray="${2*Math.PI*54}" stroke-dashoffset="0" stroke-linecap="round"/></svg>
      <div class="ring-center"><div id="ex-time" class="time-big">${fmt(ex.t)}</div></div></div>
      <div style="display:flex;gap:.4rem;justify-content:center;margin-top:.5rem">
      <button id="ex-toggle" class="btn btn-primary" style="--color:${c}" onclick="toggleExTimer()">Start</button>
      <button class="btn btn-ghost" onclick="nextEx()">Skip</button></div></div>`;
    timerLeft=ex.t;timerTotal=ex.t;timerOn=false;
  } else {
    h+=`<div style="text-align:center;padding:1rem 0"><button class="btn btn-primary" style="--color:${c};padding:.6rem 2rem;font-size:.85rem;font-weight:700;border-radius:10px" onclick="nextEx()">✓ Done</button></div>`;
  }

  h+=`</div>`; // close card

  // Nav
  h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-top:.75rem">
    <button class="btn btn-ghost" onclick="prevEx()" ${si===0&&ei===0?'disabled style="opacity:.3;pointer-events:none;padding:.4rem .75rem;border-radius:8px;font-size:.75rem"':'style="padding:.4rem .75rem;border-radius:8px;font-size:.75rem"'}>← Prev</button>
    <div style="font-size:.7rem;color:var(--tm)">${dc+1} / ${tc}</div>
    <button class="btn btn-primary" style="--color:${c};padding:.4rem .75rem;font-size:.75rem" onclick="nextEx()">${dc+1>=tc?'Finish':'Skip →'}</button></div>`;

  // Upcoming
  h+=renderUpcoming(d,c);
  h+=`</div>`;
  return h;
}

function renderSets(ex,c){
  const total=ex.s;
  let h=`<div style="padding:.5rem 0">`;
  h+=`<div style="display:flex;justify-content:center;gap:.35rem;margin-bottom:.75rem">`;
  for(let i=0;i<total;i++){
    const done=i<curSet-1,active=i===curSet-1;
    h+=`<div class="set-dot" style="background:${done?c:(active?c+'25':'var(--s1)')};border:${active?'2px solid '+c:'1px solid var(--bd)'};color:${done?'#0f1115':(active?c:'var(--tm)')}">${done?'✓':i+1}</div>`;
  }
  h+=`</div>`;
  h+=`<div style="text-align:center;color:var(--tm);font-size:.8rem;margin-bottom:.5rem">Set ${curSet} of ${total}${ex.rp?' · '+ex.rp+' reps':''}</div>`;

  if(ex.ti){
    h+=`<div style="text-align:center"><button class="btn btn-primary" style="--color:${c}" onclick="startSetTimer()">Start ${ex.t}s Timer</button><br><button class="btn btn-ghost" style="margin-top:.4rem;font-size:.7rem" onclick="finishSet()">Skip Timer</button></div>`;
  } else {
    h+=`<div style="text-align:center"><button class="btn btn-primary" style="--color:${c};padding:.65rem 2rem;font-size:.9rem;font-weight:700;border-radius:10px" onclick="finishSet()">✓ Set Complete</button></div>`;
  }
  h+=`</div>`;
  return h;
}

function renderFeedback(){
  let h=`<div style="padding:.5rem 0"><div style="text-align:center;margin-bottom:.5rem"><span style="font-size:.8rem;color:var(--tm)">Set ${curSet>1?curSet-1:curSet} complete</span></div>`;
  h+=`<div style="font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;color:var(--tm);margin-bottom:.4rem;text-align:center">How did that feel?</div>`;
  h+=`<div class="fb-grid">`;
  FB.forEach((f,i)=>{
    h+=`<button class="fb-btn" style="background:${f.c}10;border-color:${f.c}30" onclick="giveFeedback(${i})"><span class="fb-emoji">${f.e}</span><span class="fb-label" style="color:${f.c}">${f.l}</span></button>`;
  });
  h+=`</div></div>`;
  return h;
}

function renderUpcoming(d,c){
  let h=`<div style="margin-top:1rem"><div style="font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:var(--tm);margin-bottom:.3rem">Coming up</div>`;
  const up=[];let s2=si,e2=ei+1;
  while(up.length<3&&s2<d.sections.length){
    const sec=d.sections[s2];
    if(sec.emom||sec.amrap){if(s2>si)up.push({k:sec.name,d:sec.note,isSec:1});s2++;e2=0;continue;}
    while(e2<sec.ex.length&&up.length<3){up.push(sec.ex[e2]);e2++;}s2++;e2=0;
  }
  if(up.length===0){h+=`<div style="font-size:.75rem;color:var(--tm)">Last exercise!</div>`;}
  else up.forEach(u=>{
    const um=MDB[u.k];
    h+=`<div class="upcoming-row"><span>${u.k}</span><span style="display:flex;align-items:center;gap:6px">`;
    if(um&&um.w&&um.w!=='none'&&um.w!=='band')h+=`<span style="font-size:.6rem;color:#f0c040">${WT[um.w]}</span>`;
    h+=`<span style="font-size:.7rem">${u.d}</span></span></div>`;
  });
  h+=`</div>`;
  return h;
}

function renderEMOM(s,c){
  let h=`<div style="padding:0 1.25rem"><div style="text-align:center;padding:.75rem 0">
    <div style="font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--tm)" id="emom-round">Round 1 / ${Math.ceil(s.emomDur/60/s.ex.length)}</div>
    <div class="ring-wrap" style="width:150px;height:150px"><svg width="150" height="150" style="transform:rotate(-90deg)"><circle cx="75" cy="75" r="69" fill="none" stroke="var(--bd)" stroke-width="6"/><circle id="emom-ring" cx="75" cy="75" r="69" fill="none" stroke="${c}" stroke-width="6" stroke-dasharray="${2*Math.PI*69}" stroke-dashoffset="0" stroke-linecap="round"/></svg>
    <div class="ring-center"><div id="emom-time" class="time-big">1:00</div><div id="emom-total" class="time-sub">${fmt(s.emomDur)} left</div></div></div>
    <div id="emom-ex" style="margin:.75rem auto;padding:.75rem;background:var(--s1);border:2px solid ${c};border-radius:12px;max-width:300px">
      <div style="font-size:1rem;font-weight:700;color:var(--tx)">${s.ex[0].k}</div>
      <div style="font-size:.8rem;color:var(--tm)">${s.ex[0].d}</div>
      <p style="font-size:.75rem;color:var(--tm);margin-top:6px;line-height:1.5">${MDB[s.ex[0].k]?.q||''}</p>
    </div>
    <button id="emom-btn" class="btn btn-primary" style="--color:${c};padding:.55rem 1.75rem;font-size:.85rem;font-weight:700" onclick="toggleEMOM()">Start EMOM</button>
    <div style="margin-top:.75rem"><button class="btn btn-ghost" onclick="nextEx()">Skip to Next Section →</button></div>
  </div></div>`;
  return h;
}

function renderAMRAP(s,c){
  let h=`<div style="padding:0 1.25rem"><div style="text-align:center;padding:.75rem 0">
    <div class="ring-wrap" style="width:150px;height:150px"><svg width="150" height="150" style="transform:rotate(-90deg)"><circle cx="75" cy="75" r="69" fill="none" stroke="var(--bd)" stroke-width="6"/><circle id="amrap-ring" cx="75" cy="75" r="69" fill="none" stroke="${c}" stroke-width="6" stroke-dasharray="${2*Math.PI*69}" stroke-dashoffset="0" stroke-linecap="round"/></svg>
    <div class="ring-center"><div id="amrap-time" class="time-big">${fmt(s.amrapDur)}</div></div></div>
    <div style="margin:.75rem 0">`;
  s.ex.forEach(ex=>{
    const um=MDB[ex.k];
    h+=`<div style="font-size:.8rem;color:var(--tm);padding:.15rem 0"><span style="color:var(--tx);font-weight:600">${ex.k}</span> — ${ex.d}`;
    if(um?.w&&um.w!=='none')h+=` <span style="font-size:.65rem;color:#f0c040">(${WT[um.w]})</span>`;
    h+=`</div>`;
  });
  h+=`</div><div style="display:flex;align-items:center;justify-content:center;gap:.75rem">
    <button onclick="amrapRounds=Math.max(0,amrapRounds-1);$('amrap-cnt').textContent=amrapRounds" style="width:34px;height:34px;border-radius:50%;background:var(--s1);border:1px solid var(--bd);color:var(--tm);font-size:1.1rem;cursor:pointer">−</button>
    <div><div id="amrap-cnt" style="font-size:1.8rem;font-weight:800;color:#f0c040">0</div><div style="font-size:.55rem;text-transform:uppercase;letter-spacing:.1em;color:var(--tm)">Rounds</div></div>
    <button onclick="amrapRounds++;$('amrap-cnt').textContent=amrapRounds" style="width:34px;height:34px;border-radius:50%;background:var(--s1);border:1px solid ${c};color:${c};font-size:1.1rem;cursor:pointer">+</button></div>
    <button id="amrap-btn" class="btn btn-primary" style="--color:${c};margin-top:.75rem;padding:.55rem 1.75rem;font-size:.85rem;font-weight:700" onclick="toggleAMRAP()">Start AMRAP</button>
    <div style="margin-top:.75rem"><button class="btn btn-primary" style="--color:${c}" onclick="nextEx()">Finish Workout →</button></div>
  </div></div>`;
  return h;
}

// ─── ACTIONS ───
function startDay(id){dayId=id;si=0;ei=0;elapsed=0;curSet=1;resting=false;needsFeedback=false;showInfo=true;screen='workout';startTick();render();}
function backToMenu(){stopTick();clearTimers();screen='select';dayId=null;render();}
function toggleInfo(){showInfo=!showInfo;render();}

function nextEx(){
  const d=getDay(),s=d.sections[si];needsFeedback=false;resting=false;curSet=1;
  if(!s.emom&&!s.amrap&&ei<s.ex.length-1){ei++;showInfo=true;render();}
  else if(si<d.sections.length-1){si++;ei=0;showInfo=true;render();}
  else{stopTick();saveWorkout();screen='done';render();}
}
function prevEx(){
  if(ei>0){ei--;curSet=1;needsFeedback=false;resting=false;showInfo=true;render();}
  else if(si>0){const ps=getDay().sections[si-1];si--;ei=ps.emom||ps.amrap?0:ps.ex.length-1;curSet=1;needsFeedback=false;resting=false;showInfo=true;render();}
}

function finishSet(){
  const ex=getEx(),total=ex.s||1;
  if(ex.fb){needsFeedback=true;render();return;}
  if(curSet>=total){nextEx();return;}
  if(ex.rs){resting=true;restLeft=ex.rs;restTotal=ex.rs;render();}
  else{curSet++;render();}
}

function giveFeedback(i){
  const fb=FB[i];needsFeedback=false;
  const ex=getEx(),total=ex.s||1;
  showToast(fb);
  if(curSet>=total){nextEx();return;}
  if(ex.rs){curSet++;resting=true;restLeft=ex.rs;restTotal=ex.rs;render();}
  else{curSet++;render();}
}

function showToast(fb){
  if(toastId)clearTimeout(toastId);
  const t=document.createElement('div');t.className='toast';t.style.borderColor=fb.c+'40';
  t.innerHTML=`<span style="font-size:1.1rem">${fb.e}</span><span style="font-size:.8rem;color:${fb.c};font-weight:600">${fb.r}</span>`;
  document.body.appendChild(t);
  toastId=setTimeout(()=>{t.remove();toastId=null;},2500);
}

function startRest(c){
  const circ=2*Math.PI*64;
  restId=setInterval(()=>{
    restLeft--;
    const el=$('rest-time');if(el)el.textContent=fmt(restLeft);
    const ring=$('rest-ring');if(ring)ring.setAttribute('stroke-dashoffset',circ*(1-restLeft/restTotal));
    if(restLeft<=0){clearInterval(restId);resting=false;curSet++;render();}
  },1000);
}
function skipRest(){clearInterval(restId);resting=false;curSet++;render();}

function startSetTimer(){
  const ex=getEx(),c=getDay().color;
  timerLeft=ex.t;timerTotal=ex.t;timerOn=true;
  const circ=2*Math.PI*54;
  timerId=setInterval(()=>{
    timerLeft--;
    const el=$('ex-time');if(el)el.textContent=fmt(timerLeft);
    const ring=$('ex-ring');if(ring)ring.setAttribute('stroke-dashoffset',circ*(1-timerLeft/timerTotal));
    if(timerLeft<=0){clearInterval(timerId);timerOn=false;finishSet();}
  },1000);
  render();
}

function toggleExTimer(){
  if(timerOn){clearInterval(timerId);timerOn=false;const b=$('ex-toggle');if(b)b.textContent='Resume';}
  else{
    const c=getDay().color,circ=2*Math.PI*54;
    timerOn=true;
    timerId=setInterval(()=>{
      timerLeft--;
      const el=$('ex-time');if(el)el.textContent=fmt(timerLeft);
      const ring=$('ex-ring');if(ring)ring.setAttribute('stroke-dashoffset',circ*(1-timerLeft/timerTotal));
      if(timerLeft<=0){clearInterval(timerId);timerOn=false;nextEx();}
    },1000);
    const b=$('ex-toggle');if(b){b.textContent='Pause';b.className='btn btn-danger';}
  }
}

function updateTopBar(){const el=$('elapsed');if(el)el.textContent=fmt(elapsed);}

// ─── EMOM ───
function initEMOM(s){emomLeft=s.emomDur;emomOn=false;}
function toggleEMOM(){
  const s=getSec(),c=getDay().color,circ=2*Math.PI*69;
  if(emomOn){clearInterval(emomId);emomOn=false;const b=$('emom-btn');if(b)b.textContent='Resume';return;}
  emomOn=true;const b=$('emom-btn');if(b){b.textContent='Pause';b.className='btn btn-danger';}
  emomId=setInterval(()=>{
    emomLeft--;if(emomLeft<=0){clearInterval(emomId);emomOn=false;const b=$('emom-btn');if(b)b.textContent='Complete';return;}
    const el2=s.emomDur-emomLeft,min=Math.floor(el2/60),idx=min%s.ex.length,rnd=Math.floor(min/s.ex.length)+1,sec=el2%60;
    const tl=$('emom-time');if(tl)tl.textContent=fmt(60-sec);
    const tot=$('emom-total');if(tot)tot.textContent=fmt(emomLeft)+' left';
    const rn=$('emom-round');if(rn)rn.textContent=`Round ${rnd} / ${Math.ceil(s.emomDur/60/s.ex.length)}`;
    const ring=$('emom-ring');if(ring)ring.setAttribute('stroke-dashoffset',circ*(1-(60-sec)/60));
    const exEl=$('emom-ex');if(exEl){const m=MDB[s.ex[idx].k];exEl.innerHTML=`<div style="font-size:1rem;font-weight:700;color:var(--tx)">${s.ex[idx].k}</div><div style="font-size:.8rem;color:var(--tm)">${s.ex[idx].d}</div>${m?`<p style="font-size:.75rem;color:var(--tm);margin-top:6px;line-height:1.5">${m.q}</p>`:''}`;}
  },1000);
}

// ─── AMRAP ───
function initAMRAP(s){amrapLeft=s.amrapDur;amrapOn=false;amrapRounds=0;}
function toggleAMRAP(){
  const s=getSec(),c=getDay().color,circ=2*Math.PI*69;
  if(amrapOn){clearInterval(amrapId);amrapOn=false;const b=$('amrap-btn');if(b)b.textContent='Resume';return;}
  amrapOn=true;const b=$('amrap-btn');if(b){b.textContent='Pause';b.className='btn btn-danger';}
  amrapId=setInterval(()=>{
    amrapLeft--;if(amrapLeft<=0){clearInterval(amrapId);amrapOn=false;const b=$('amrap-btn');if(b)b.textContent='Done!';
    const tl=$('amrap-time');if(tl)tl.textContent='TIME';return;}
    const tl=$('amrap-time');if(tl)tl.textContent=fmt(amrapLeft);
    const ring=$('amrap-ring');if(ring)ring.setAttribute('stroke-dashoffset',circ*(1-amrapLeft/getSec().amrapDur));
  },1000);
}

// ─── PIN ───
// Hash of the correct PIN — input is hashed via SHA-256 and compared, PIN never stored in plain text
const PIN_HASH='6161b2838ffa6ce17b84db3b45b4f8437855ecf43e75de2d1ad0008eaae91aa0';
let pinInput='';

async function sha256(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function initApp(){renderPin();}

function renderPin(){
  const dots=[0,1,2,3].map(i=>`<div style="width:14px;height:14px;border-radius:50%;background:${i<pinInput.length?'#f0c040':'var(--bd)'};transition:background .15s"></div>`).join('');
  const keys=[1,2,3,4,5,6,7,8,9,'','0','⌫'].map(k=>{
    if(k==='')return'<div></div>';
    const back=k==='⌫';
    return`<button onclick="${back?'pinDel()':'pinTap('+k+')'}" style="height:64px;border-radius:14px;background:var(--s1);border:1px solid var(--bd);font-size:${back?'1.4':'1.3'}rem;font-weight:700;color:${back?'var(--tm)':'var(--tx)'};cursor:pointer">${k}</button>`;
  }).join('');
  app.innerHTML=`<div style="min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem">
    <div style="font-size:1.3rem;font-weight:800;background:linear-gradient(135deg,#f0c040,#fde68a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.25rem">KB Tracker</div>
    <div style="font-size:.8rem;color:var(--tm);margin-bottom:2.5rem">Enter PIN</div>
    <div id="pin-dots" style="display:flex;gap:1rem;margin-bottom:3rem">${dots}</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;width:100%;max-width:280px">${keys}</div>
  </div>`;
}

function pinTap(n){
  if(pinInput.length>=4)return;
  pinInput+=String(n);
  renderPin();
  if(pinInput.length===4)setTimeout(checkPin,120);
}

function pinDel(){pinInput=pinInput.slice(0,-1);renderPin();}

async function checkPin(){
  const h=await sha256(pinInput);
  if(h===PIN_HASH){render();}
  else{pinInput='';shakeDots();}
}

function shakeDots(){
  const el=$('pin-dots');if(!el)return;
  [...el.children].forEach(d=>{d.style.background='#f87171';});
  el.style.animation='shake .35s ease';
  setTimeout(()=>{el.style.animation='';renderPin();},400);
}

// ─── INIT ───
initApp();
</script>
